<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroFlow - Office Wall Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          background-color: #f3f4f6; 
          color: #1e293b;
          overflow-x: hidden;
        }
        
        .whiteboard-wall {
          background-color: #f3f4f6;
          background-image: radial-gradient(#d1d5db 1px, transparent 1px);
          background-size: 40px 40px;
        }

        .sticky-note {
          box-shadow: 2px 4px 8px rgba(0,0,0,0.15);
          transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .sticky-note:hover {
          box-shadow: 4px 8px 15px rgba(0,0,0,0.2);
          transform: scale(1.02) rotate(0deg) !important;
          z-index: 50;
        }

        .marker-font {
          font-family: 'Plus Jakarta Sans', sans-serif;
          font-weight: 600;
        }

        .header-note {
          font-family: 'Permanent Marker', cursive;
          box-shadow: 3px 6px 12px rgba(0,0,0,0.2);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react": "https://esm.sh/react@^19.2.3",
    "@heroicons/react/24/solid": "https://esm.sh/@heroicons/react@2.2.0/24/solid",
    "@heroicons/react/24/outline": "https://esm.sh/@heroicons/react@2.2.0/24/outline",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@heroicons/react/": "https://esm.sh/@heroicons/react@^2.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="whiteboard-wall">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
